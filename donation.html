    <style>
        .PaymentWays button{
            width: 300px;

        body {
            font-family: monospace;

            border-radius: 5px;
        }
        h2 {
            text-align: center;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input[type="text"], input[type="email"], input[type="tel"], input[type="number"], select {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        input[type="submit"] {
            background-color: #04aa70;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
        }
        input[type="submit"]:hover {
            background-color: #08db12;
        }

        #paymentdetails{
            display: none;
            margin-left: 10px;
        }
        .container{
            display: flex;
            
        }
        #checkmark{
            display: none; /* Hides the button */
            color: green; 
            font-size: 24px; 
            margin-top: 10px; /* Space above the checkmark */
        }

       


    </style>

            <title>Give & Get Form</title>
            
        
            <h2>Give & Get Form</h2>
            <form action="PayWaysMasterCard.html" method="POST">
                <label for="name">Full Name:</label>
                <input type="text" id="name" name="name" required>
            
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            
                <label for="phone">Phone Number:</label>
                <input type="tel" id="phone" name="phone" required>
            
                <label for="address">Shipping Address:</label>
                <input type="text" id="address" name="address" required>
            
                <label for="city">City:</label>
                <input type="text" id="city" name="city" required>
            
                <label for="payment">State:</label>
                <select id="payment" name="payment">
                    <option value="credit_card">Selangor</option>
                    <option value="paypal">Kuala Lumpur</option>
                    <option value="bank_transfer">Johor</option>
                </select>
            
                <label for="zip">Zip Code:</label>
                <input type="number" id="zip" name="zip" required>
            
                <div class="aboutUsBox">
                    <button type="button" onclick="showCheckmark()">Confirm Details</button>
                    

                    <script>
                        function showCheckmark() {
                            document.getElementById("checkmark").style.display = "block";
                        }
                    </script>
                

                <div id="checkmark">&check;
                    <button id="toggleButton">Proceed With Payment Details</button>
                    
                </div>
            </form>
